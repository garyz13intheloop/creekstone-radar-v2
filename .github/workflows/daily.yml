name: Daily Radar

on:
  schedule:
    - cron: "30 9 * * *"   # UTC 09:30 = Beijing 17:30
  workflow_dispatch:
    inputs:
      sources:
        description: "Comma-separated sources (empty = all)"
        default: ""
      no_s3:
        description: "Skip LLM scoring"
        default: "false"
        type: boolean
      no_feishu:
        description: "Skip Feishu push"
        default: "false"
        type: boolean

permissions:
  contents: write

concurrency:
  group: radar-daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'google/gemini-flash-1.5' }}
          S3_MODEL: ${{ vars.S3_MODEL || 'anthropic/claude-haiku-4' }}
          PRODUCTHUNT_DEVELOPER_TOKEN: ${{ secrets.PRODUCTHUNT_DEVELOPER_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID || '' }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET || '' }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN || '' }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL || '' }}
          ENABLED_SOURCES: ${{ github.event.inputs.sources || 'producthunt,github_trending,github_events,arxiv,hackernews,reddit,x_twitter,openrouter,huggingface' }}
        run: |
          FLAGS=""
          [ "${{ github.event.inputs.no_s3 }}" = "true" ] && FLAGS="$FLAGS --no-s3"
          [ "${{ github.event.inputs.no_feishu }}" = "true" ] && FLAGS="$FLAGS --no-feishu"
          python pipeline/runner.py $FLAGS

      - name: Commit data
        run: |
          git config user.name "CreekstoneRadarBot"
          git config user.email "radar@creekstone.vc"
          git add data/
          git diff --cached --quiet || git commit -m "radar: $(date -u +%Y-%m-%d) daily update"
          git push

      - name: Alert on failure
        if: failure()
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          if [ -n "$FEISHU_WEBHOOK_URL" ]; then
            curl -s -X POST "$FEISHU_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d '{"msg_type":"text","content":{"text":"⚠️ Creekstone Radar 每日 pipeline 失败，请检查 GitHub Actions。"}}'
          fi
